name: hdos-prod

services:
  app:
    image: foxai-hdos:latest
    container_name: foxai-hdos
    build:
      context: .
      target: runner
    ports:
      - "4000:4000"
    volumes:
      - ./certs:/app/certs:ro
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512m
