name: hdos-prod

services:
  app:
    image: foxai-hdos:latest
    container_name: foxai-hdos
    build:
      context: .
      target: runner
    ports:
      - "4000:4000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512m
